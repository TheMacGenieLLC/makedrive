# ==============================================================================
# Image Paths & Add Menu Order
# ==============================================================================
# addMenuOrder lists installer keys in the order they appear in the add image
# menu. imageFilePaths is derived from it so adding a key here automatically
# includes that image in presence, compression, and scan checks.
addMenuOrder=( "inst103p" "inst104p" "inst104i" "inst105u" "inst106i" "inst107i" "inst108i" "inst109i" "inst1010i" "inst1011i" "inst1012i" "inst1013i" "inst1014i" "inst1015i" "inst1100u" "inst1200u" "inst1300u" "inst1400u" "inst1500u" "inst2600u" "inst2700a" )
imageFilePaths=()
for _key in "${addMenuOrder[@]}"; do imageFilePaths+=( "${!_key}" ); done
unset _key

# ==============================================================================
# Build Type Configurations
# ==============================================================================
# Each build type requires the following variables (replace XX with the type
# number shown in the build menu, e.g. 10, 11, 12):
#
#   buildTypeXX_volumes  - Ordered array of inst keys and "dataDrive" to build
#   buildTypeXX_scheme   - Partition scheme: GPT (Intel/AS) or APM (PowerPC)
#   buildTypeXX_label    - Short label shown in the build drive menu
#   buildTypeXX_detail   - Size/description shown below the label in the menu
#
# buildTypeNums lists all valid type numbers and drives the menu display and
# input validation in build_menu_chooser.

# ------------------------------------------------------------------------------
# Type 10 - Apple Silicon & Intel Installers
# ------------------------------------------------------------------------------
buildType10_volumes=( "inst2700a" "inst2600u" "inst1500u" "inst1400u" "inst1300u" "inst1200u" "inst1100u" "inst1015i" "inst1014i" "inst1013i" "inst1012i" "inst1011i" "inst1010i" "inst109i" "inst108i" "inst107i" "inst106i" "dataDrive" )
buildType10_scheme="GPT"
buildType10_label="Apple Silicon & Intel Installers"
buildType10_detail="About 200GB plus DataDrive"

# ------------------------------------------------------------------------------
# Type 11 - Older PPC & Intel Installers
# ------------------------------------------------------------------------------
buildType11_volumes=( "inst1011i" "inst1010i" "inst109i" "inst108i" "inst107i" "inst106i" "inst105u" "inst104i" "inst104p" "inst103p" "dataDrive" )
buildType11_scheme="APM"
buildType11_label="Older PPC & Intel 10.3-10.11 Installers"
buildType11_detail="About 100GB plus DataDrive"

# ------------------------------------------------------------------------------
# Type 12 - DataDrive Only
# ------------------------------------------------------------------------------
buildType12_volumes=( "dataDrive" )
buildType12_scheme="GPT"
buildType12_label="DataDrive Only"
buildType12_detail="About 200GB for images and data"

# Registry of all valid build type numbers, in menu display order.
buildTypeNums=( "10" "11" "12" )

