# build drive configurations. makedrive.command reads this file at startup
# and requires it to be present alongside the script.
#
# Adding a new installer requires a new image definition block below (with
# MenuLabel and AddFunc) and its key added to addMenuOrder.

# ==============================================================================
# Operational Settings
# ==============================================================================

# DataDrive partition - temporary name used during disk partitioning, final name
# visible in Finder, partition size (0G = use remaining disk space), filesystem.
dataDriveStartName="DataDriveTempFolder"
dataDriveFinalName="DataDrive"
dataDriveVolSize="0G"
dataDriveVolType="JHFS+"

# Seconds to wait after disabling Spotlight on each deployed volume.
spotlightSleepInSeconds=2

# DMG compression format used by dmgtool_compress_dmg and verified by
# dmgtool_scan_dmg and check_file_presence.
dmgCompressionType="ULFO"
dmgCompressionString="lzfse"

# Apple Software Update catalog index URLs. When Apple publishes the first
# developer preview of a new macOS generation a new index URL appears on
# Apple's CDN - add it here and makedrive will begin tracking it automatically.
# The newer generation index always goes first so the freshest catalog wins.
catalogURLs=(
    "https://swscan.apple.com/content/catalogs/others/index-27-26-15-14-13-12-10.16-10.15-10.14-10.13-10.12-10.11-10.10-10.9-mountainlion-lion-snowleopard-leopard.merged-1.sucatalog.gz"
    "https://swscan.apple.com/content/catalogs/others/index-26-15-14-13-12-10.16-10.15-10.14-10.13-10.12-10.11-10.10-10.9-mountainlion-lion-snowleopard-leopard.merged-1.sucatalog.gz"
)

# Script copied to the root of 10.7-10.9 installer volumes at deploy time.
# Run it from Terminal inside the installer when the installer refuses to proceed
# due to expired signing certificates that Apple has not re-issued.
IFS= read -r -d '' datefix_script << 'MAKEDRIVE_DATEFIX_EOF'
#!/bin/sh
# datefix - part of makedrive (https://makedrive.com). Placed here automatically
# to work around expired installer signing certificates that Apple has not
# re-issued; not malware. Source: https://makedrive.com
# Pre-flight for bootable installers: Lion / Mountain Lion / Mavericks only
# Usage from installer Terminal: sh /Volumes/*/datefix

# Detect Wi-Fi interface and disable it
WIFI=$(networksetup -listallhardwareports \
  | awk '/Wi-Fi|AirPort/{getline; print $NF}')
[ -n "$WIFI" ] && networksetup -setairportpower "$WIFI" off \
  && echo "Wi-Fi ($WIFI) disabled." \
  || echo "No Wi-Fi found, skipping."

# Read OS version from installer volume
PLIST=$(find /Volumes -maxdepth 6 -name SystemVersion.plist 2>/dev/null | head -1)
VER=$(defaults read "$PLIST" ProductVersion 2>/dev/null | awk -F. '{print $1"."$2}')

case "$VER" in
  10.7|10.8|10.9)
    date 010100002021
    echo "Clock set to Jan 1 2021 - ready to install."
    ;;
  *)
    echo "Version $VER detected - no date change needed. Verify cert status before proceeding."
    ;;
esac
MAKEDRIVE_DATEFIX_EOF

# ==============================================================================
# Install Image Definitions
# ==============================================================================
#
# Each installer entry is a set of shell variables sharing a unique key prefix
# (e.g. inst2700a, inst1500u). Two deploy types are supported:
#
#   GENERIC  - Mac App Store installer. makedrive runs createinstallmedia to
#              build a bootable DMG, stores it in restorekit, and restores it
#              to target volumes via asr.
#   INST-A   - Pre-built or legacy DMG copied directly into restorekit and
#              restored via asr. A Finder window opened during restore is
#              closed automatically.
#
# Required for all image types:
#   instXXXX              - Path to the DMG in restorekit (use $executionPath)
#   instXXXXDeployType    - "GENERIC" or "INST-A" (see descriptions above)
#   instXXXXDispName      - Full display name for menus and progress output
#   instXXXXFinalName     - Volume name after deployment (visible in Finder)
#   instXXXXStartName     - Temporary partition name used during disk setup
#   instXXXXVolSize       - Partition size (e.g. "20.0G")
#   instXXXXVolType       - Filesystem type (e.g. "JHFS+")
#   instXXXXBuildNumber   - macOS build string to verify the source before
#                           adding to restorekit (e.g. "24G85"); empty = skip
#   instXXXXMenuLabel     - Short label shown in the add image menu
#   instXXXXAddFunc       - Function that adds this image to restorekit:
#                             COPY_SINGLE              - INST-A entries
#                             CREATE_INSTALL_MEDIA     - GENERIC, Mojave and later
#                             CREATE_INSTALL_MEDIA_MAV - GENERIC, Yosemite-High Sierra
#
# Additional variables for GENERIC images only:
#   instXXXXAppPath          - Path to the installer app in /Applications
#   instXXXXNewImageVolSize  - Capacity of the temp DMG createinstallmedia writes
#                              the installer into (e.g. "20.0G")
#
# Additional variables for INST-A images only:
#   instXXXXSourceImagePath  - Path to the source DMG within the app bundle
#                              (optional; if empty the user is prompted to drag
#                              the file into Terminal)
#   instXXXXVolName          - Volume name the DMG presents after ASR restore;
#                              may differ from FinalName for optical/ESD media
#                              (e.g. "Mac OS X Install ESD", renamed to FinalName)

